title: PET - Case 3
description: Parameters for PET (case 3 - Penman-Monteith).
x-fortran-namelist: pet3
type: object
properties:
  canopyheigth_forest:
    title: Canopy height forest
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[15.00, 40.00, 15.000, 1, 1]]
  canopyheigth_impervious:
    title: Canopy height impervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.01, 0.50, 0.0200, 1, 1]]
  canopyheigth_pervious:
    title: Canopy height pervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.10, 5.00, 0.1100, 1, 1]]
  displacementheight_coeff:
    title: Displacement height coefficient
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.50, 0.85, 0.6400, 1, 1]]
  roughnesslength_momentum_coeff:
    title: Roughness length momentum coefficient
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.09, 0.16, 0.0950, 1, 1]]
  roughnesslength_heat_coeff:
    title: Roughness length heat coefficient
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.07, 0.13, 0.0750, 1, 1]]
  stomatal_resistance:
    title: Stomatal resistance
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[10.00, 200.00, 56.000, 1, 1]]
required:
  - canopyheigth_forest
  - canopyheigth_impervious
  - canopyheigth_pervious
  - displacementheight_coeff
  - roughnesslength_momentum_coeff
  - roughnesslength_heat_coeff
  - stomatal_resistance
