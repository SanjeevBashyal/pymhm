[helper]
path = "src/nml/nml_helper.f90"
module = "nml_helper"
buffer = 1024
header = '''
!> \dir nml
!> \copydoc f_namelists

!> \defgroup   f_namelists Namelists - Fortran modules
!> \brief      Modules for namelist handling in mHM.
!> \details    These modules provide functionalities to read, write, and manage namelists used in the mHM hydrological model.
'''

[kinds]
module = "mo_kind"
real = ["sp", "dp"]
integer = ["i1", "i2", "i4", "i8"]

[constants]
[constants.buf]
value = 256
doc = "String buffer length."

[dimensions]
[dimensions.max_layers]
default = 10
doc = "Maximum number of soil-layer entries stored per domain in a namelist file."

[dimensions.n_domains]
default = 100
doc = "Number of domains."

[dimensions.n_geo_units]
default = 25
doc = "Number of geological units."

[documentation]
module = '''
!> \version 0.2
!> \authors Sebastian Mueller
!> \date    Jun 2026
!> \copyright Copyright 2005-\today, the mHM Developers, Luis Samaniego, Sabine Attinger: All rights reserved.
!! mHM is released under the LGPLv3+ license \license_note
!> \ingroup f_namelists
'''
md_doxygen_id_from_name = true  # add {#<namelist>} to Markdown header
md_add_toc_statement = true     # insert [TOC] after the header

[[namelists]]
name = "config_project"
schema = "nml-schemas/config_project.yml"
