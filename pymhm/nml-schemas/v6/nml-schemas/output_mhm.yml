title: mHM output configuration
description: Output configuration for mHM.
x-fortran-namelist: output_mhm
type: object
properties:
  output_deflate_level:
    title: Output deflate level
    type: integer
    x-fortran-kind: i4
    default: 6
    minimum: 0
    maximum: 9
    description: |-
      Compression level for netCDF4 outputs (0: no compression, 9: maximum compression).
  output_double_precision:
    title: Output double precision
    type: boolean
    default: false
  output_time_reference:
    title: Output time reference
    type: integer
    x-fortran-kind: i4
    enum: [0, 1, 2]
    default: 2
    description: |-
      Location of reference time point in outputs:
      - if 0 : start of the time interval (i.e. 1990-01-01 00:00 for daily output on 1990-01-01)
      - if 1 : center of the time interval (i.e. 1990-01-01 12:00 for daily output on 1990-01-01)
      - if 2 : end of the time interval (i.e. 1990-01-02 00:00 for daily output on 1990-01-01)
  output_frequency:
    title: Output time step
    type: integer
    x-fortran-kind: i4
    minimum: -3
    default: -2
    description: |-
      switch to control write out frequency of the gridded model outputs below
      - if >0 : after each <timeStep_model_outputs> time steps
      - if 0 : only at end of run
      - if -1 : daily
      - if -2 : monthly
      - if -3 : yearly
  out_interception:
    title: Interception
    type: boolean
    default: false
    description: Canopy interception storage (L1_inter) [mm]
  out_snowpack:
    title: Snowpack
    type: boolean
    default: false
    description: Height of snowpack (L1_snowpack) [mm]
  out_SWC:
    title: Layered Soil Water Content
    type: boolean
    default: false
    description: soil water content in the single layers (L1_soilMoist)
  out_SM:
    title: Layered Volumetric Soil Moisture
    type: boolean
    default: false
    description: |-
      volumetric soil moisture in the single layers (L1_soilMoist / L1_soilMoistSat) [mm/mm]
  out_SM_all:
    title: Mean Volumetric Soil Moisture
    type: boolean
    default: false
    description: |-
      mean volumetric soil moisture averaged over all soil layers (L1_soilMoist / L1_soilMoistSat) [mm/mm]
  out_sealedSTW:
    title: Reservoir of Sealed areas
    type: boolean
    default: false
    description: waterdepth in reservoir of sealed areas (L1_sealSTW) [mm]
  out_unsatSTW:
    title: Reservoir of Unsaturated areas
    type: boolean
    default: false
    description: waterdepth in reservoir of unsat. soil zone (L1_unsatSTW) [mm]
  out_satSTW:
    title: Reservoir of Saturated areas
    type: boolean
    default: false
    description: |-
      Water depth in reservoir of sat. soil zone (L1_satSTW) [mm]
      --> level of GW reservoir
  out_PET:
    title: Potential Evapotranspiration
    type: boolean
    default: false
    description: Potential evapotranspiration PET [mm/T]
  out_aET_all:
    title: Mean actual Evapotranspiration
    type: boolean
    default: false
    description: Actual evapotranspiration aET [mm/T]
  out_Q:
    title: Total Discharge
    type: boolean
    default: false
    description: Total discharge generated per cell (L1_total_runoff) [mm/T]
  out_QD:
    title: Direct Runoff
    type: boolean
    default: false
    description: Direct runoff generated per cell (L1_runoffSeal) [mm/T]
  out_QIf:
    title: Fast Interflow
    type: boolean
    default: false
    description: Fast interflow generated per cell (L1_fastRunoff) [mm/T]
  out_QIs:
    title: Slow Interflow
    type: boolean
    default: false
    description: Slow interflow generated per cell (L1_slowRunoff) [mm/T]
  out_QB:
    title: Baseflow
    type: boolean
    default: false
    description: Baseflow generated per cell (L1_baseflow) [mm/T]
  out_recharge:
    title: Groundwater Recharge
    type: boolean
    default: false
    description: Groundwater Recharge (L1_percol) [mm/T]
  out_soil_infil:
    title: Soil Infiltration
    type: boolean
    default: false
    description: Infiltration (L1_infilSoil) [mm/T]
  out_neutrons:
    title: Neutrons
    type: boolean
    default: false
    description: |-
      Ground albedo Neutrons related to soil moisture
      THIS IS WORK IN PROGRESS, DO NOT USE FOR RESEARCH
  out_aET_layer:
    title: Actual Evapotranspiration from Soil Layers
    type: boolean
    default: false
    description: Actual evapotranspiration from the soil layers [mm/T]
  out_preEffect:
    title: Effective Precipitation
    type: boolean
    default: false
    description: Effective Precipitation (L1_preEffect) [mm/T]
  out_Qsm:
    title: Snow Melt
    type: boolean
    default: false
    description: Snow melt (L1_melt) [mm/T]
