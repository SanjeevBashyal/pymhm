  gain_loss_GWreservoir_karstic:
    title: Gain/loss GW reservoir karstic
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    x-nml-tools-ui:
      axes:
        "1":
          title: Parameter component
          labels: [Lower bound, Upper bound, Value, Flag, Scaling]
    examples: [[1.0000, 1.0000, 1.0, 0, 1]]
required:
  - rechargeCoefficient
  - rechargeFactor_karstic
  - gain_loss_GWreservoir_karstic
