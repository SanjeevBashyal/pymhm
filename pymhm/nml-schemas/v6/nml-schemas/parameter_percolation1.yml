title: Percolation - Case 1
description: Parameters for percolation.
x-fortran-namelist: percolation1
type: object
properties:
  rechargeCoefficient:
    title: Recharge coefficient
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    x-nml-tools-ui:
      axes:
        "1":
          title: Parameter component
          labels: [Lower bound, Upper bound, Value, Flag, Scaling]
