title: Coupling configuration
description: |-
  Coupling grid and variable settings for meteorological, hydrological, and morphology components.
  Arrays are indexed by domain (dimension 1).
  Grid parameters define resolutions and coordinate systems for coupled runs.
  Coupled flags indicate whether inputs are provided by an external model.
x-fortran-namelist: config_coupling
type: object
properties:
  meteo_grid_nx:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      minimum: 1
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Meteo grid size in x-direction
  meteo_grid_ny:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      minimum: 1
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Meteo grid size in y-direction
  meteo_grid_xll:
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Meteo grid x origin
  meteo_grid_yll:
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Meteo grid y origin
  meteo_grid_cellsize:
    type: array
    items:
      type: number
      x-fortran-kind: dp
      exclusiveMinimum: 0.0
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Meteo grid cell size
  meteo_grid_ydir:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      enum: [0, 1]
      default: 0
    x-fortran-shape: max_domains
    title: Meteo grid y direction
    description: |-
      Direction of the y-axis for the meteorological grid.
      - 0 : top-down y-axis
      - 1 : bottom-up y-axis
  meteo_grid_coordsys:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      enum: [0, 1]
      default: 0
    x-fortran-shape: max_domains
    title: Meteo grid coordinate system
    description: |-
      Coordinate system for the meteorological grid.
      - 0 : cartesian
      - 1 : latlon
  hydro_grid_nx:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      minimum: 1
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Hydro grid size in x-direction
  hydro_grid_ny:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      minimum: 1
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Hydro grid size in y-direction
  hydro_grid_xll:
