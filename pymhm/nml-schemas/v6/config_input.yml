title: Input configuration
description: |-
  Paths and variable names for input data used by mHM.
  Arrays are indexed by domain (dimension 1). Most paths are optional.
  Variable name entries define the NetCDF variable names to read.
x-fortran-namelist: config_input
type: object
properties:
  chunking:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      minimum: -3
      default: 0
    x-fortran-shape: max_domains
    title: Chunking for input data
    description: |-
      Chunking configuration for reading input data (array dimension 1: domain)
      - n>0 : after each n time-steps
      - 0 : only at beginning of the run
      - -1 : daily
      - -2 : monthly
      - -3 : yearly
  time_stamp_location:
    type: array
    items:
      type: integer
      x-fortran-kind: i4
      enum: [0, 1, 2]
      default: 0
    x-fortran-shape: max_domains
    title: NetCDF time-stamp location
    description: |-
      NetCDF time-stamp location: when no time-bounds are given in the input data.
      - 0 : beginning of time step (default)
      - 1 : center of time step
      - 2 : end of time step
  latlon_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Latlon specification file path
  morph_latlon:
    type: array
    items:
      type: boolean
      default: false
    x-fortran-shape: max_domains
    title: DEM in latlon coordinates
  pre_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Precipitation input
  pet_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Potential evapotranspiration input
  temp_path:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Air temperature input
  tann_path:
