title: Project configuration
description: Configuration for the overall project setup in mHM.
x-fortran-namelist: config_project
type: object
properties:
  project_details:
    type: string
    x-fortran-len: buf
    default: mHM project
    title: Project name
  setup_description:
    type: string
    x-fortran-len: buf
    default: Model run
    title: Description of the setup
  simulation_type:
    type: string
    x-fortran-len: buf
    default: Simulation
    title: Type of simulation
    description: |-
      e.g. hindcast simulation, seasonal forecast, climate projection
  Conventions:
    type: string
    x-fortran-len: buf
    default: None
    title: Convention used for dataset
  contact:
    type: string
    x-fortran-len: buf
    default: Developer
    title: Contact details, incl. PI name, modellers
  mHM_details:
    type: string
    x-fortran-len: buf
    default: Research unit
    title: Developing institution
  history:
    type: string
    x-fortran-len: buf
    default: Model run version 1
    title: Some details on data/model run version.
  n_domains:
    type: integer
    x-fortran-kind: i4
    default: 1
    title: Number of domains
    description: Number of domains to be simulated.
  read_domains_from_dirs:
    type: boolean
    default: false
    title: Flag for separate domains
    description: |-
      Read domain configurations from namelists in separate directories.
      Only "config_project", "config_processes" and "config_optimize" are read from this file then.
  domain_dirs:
    type: array
    items:
      type: string
      x-fortran-len: buf
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    title: Domain directories
    description: |-
      Paths to be included in the simulation
