title: Snow - Case 1
description: Parameters for Snow module.
x-fortran-namelist: snow1
type: object
properties:
  snowTreshholdTemperature:
    title: Threshold for rain/snow partitioning [degC].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[-2.0000, 2.0000, 1.0, 1, 1]]
  degreeDayFactor_forest:
    title: Degree day factors to determine melting flux [m degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0001, 4.0000, 1.5, 1, 1]]
  degreeDayFactor_impervious:
    title: Degree day factors to determine melting flux [m degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 1.0000, 0.5, 1, 1]]
  degreeDayFactor_pervious:
    title: Degree day factors to determine melting flux [m degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 2.0000, 0.5, 1, 1]]
  increaseDegreeDayFactorByPrecip:
    title: Increase of degree day factor if there is precipitation [degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.1000, 0.9000, 0.5, 1, 1]]
  maxDegreeDayFactor_forest:
    title: Maximum values for degree day factor [m degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 8.0000, 3.0, 1, 1]]
  maxDegreeDayFactor_impervious:
    title: Maximum values for degree day factor [m degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 8.0000, 3.5, 1, 1]]
  maxDegreeDayFactor_pervious:
    title: Maximum values for degree day factor [m degC-1].
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 8.0000, 4.0, 1, 1]]
required:
  - snowTreshholdTemperature
  - degreeDayFactor_forest
  - degreeDayFactor_impervious
  - degreeDayFactor_pervious
  - increaseDegreeDayFactorByPrecip
  - maxDegreeDayFactor_forest
  - maxDegreeDayFactor_impervious
  - maxDegreeDayFactor_pervious
