[[file_profiles]]
name = "main"
title = "mHM 5.13 configuration"
description = "Legacy mHM, MPR, and mRM runtime configuration."
default_file = "mhm.nml"
namelists = [
  "project_description",
  "mainconfig",
  "mainconfig_mhm_mrm",
  "mainconfig_mrm",
  "directories_general",
  "directories_mHM",
  "directories_mRM",
  "processSelection",
  "LCover",
  "time_periods",
  "soildata",
  "LAI_data_information",
  "LCover_MPR",
  "directories_MPR",
  "evaluation_gauges",
  "panEvapo",
  "nightDayRatio",
  "Optimization",
  "baseflow_config",
]
required = [
  "project_description",
  "mainconfig",
  "mainconfig_mhm_mrm",
  "directories_general",
  "directories_mHM",
  "processSelection",
  "time_periods",
  "soildata",
]

[[file_profiles]]
name = "output"
title = "mHM 5.13 output configuration"
default_file = "mhm_outputs.nml"
namelists = ["NLoutputResults"]

[[file_profiles]]
name = "parameter"
title = "mHM 5.13 parameter configuration"
default_file = "mhm_parameter.nml"
namelists = [
  "interception1",
  "snow1",
  "soilmoisture1",
