[constants]
[constants.buf]
value = 256
doc = "String buffer length."

[dimensions]
[dimensions.max_domains]
default = 100
doc = "Maximum number of domains."

[dimensions.max_geo_units]
default = 25
doc = "Maximum number of geological units."

[dimensions.max_layers]
default = 10
doc = "Maximum number of soil layers."

