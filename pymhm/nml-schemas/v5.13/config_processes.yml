title: Processes configuration
description: Configuration for process case selection in mHM.
x-fortran-namelist: config_processes
type: object
properties:
  interception:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [-1, 0, 1]
    title: Interception process case
    description: |-
      Process case for interception.
      - -1: pass through precipitation as throughfall
      - 0: deactivated
      - 1: maximum Interception
  snow:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [-1, 0, 1]
    title: Snow process case
    description: |-
      Process case for snow.
      - -1: pass through throughfall as effective precipitation
      - 0: deactivated
      - 1: degree-day approach
  soil_moisture:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [0, 1, 2, 3, 4]
    title: Soil moisture process case
    description: |-
      Process case for soil moisture.
      - 0: deactivated
      - 1: Feddes equation for ET reduction, multi-layer infiltration capacity approach, Brooks-Corey like
      - 2: Jarvis equation for ET reduction, multi-layer infiltration capacity approach, Brooks-Corey like
      - 3: Jarvis equation for ET reduction and global FC dependency on root fraction coefficient
      - 4: Feddes equation for ET reduction and global FC dependency on root fraction coefficient
  direct_runoff:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [0, 1]
    title: Direct runoff process case
    description: |-
      Process case for direct runoff.
      - 0: deactivated
      - 1: linear reservoir exceedance approach
  pet:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [-2]
    enum: [-2, -1, 0, 1, 2, 3]
    title: Potential evapotranspiration (PET) process case
    description: |-
      Process case for potential evapotranspiration (PET).
      - -2: PET is input, aspect driven correction
      - -1: PET is input, LAI driven correction
      - 0: deactivated
      - 1: Hargreaves-Samani method
      - 2: Priestley-Taylor method
      - 3: Penman-Monteith method
  interflow:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [0, 1]
    title: Interflow process case
    description: |-
      Process case for interflow.
      - 0: deactivated
      - 1: storage reservoir with one outflow threshold and nonlinear response
  percolation:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [0, 1]
    title: Percolation process case
    description: |-
      Process case for percolation.
      - 0: deactivated
      - 1: GW assumed as linear reservoir
  baseflow:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [1]
    enum: [0, 1]
    title: Baseflow process case
    description: |-
      Process case for baseflow.
      - 0: deactivated
      - 1: recession parameters (not regionalized yet)
  neutrons:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [0]
    enum: [0, 1, 2]
    title: Ground albedo of cosmic-ray neutrons process case
    description: |-
      Ground albedo of cosmic-ray neutrons process case.
      Work in progress, do not use for research.
      - 0: deactivated
      - 1: inverse N0 based on Desilets et al. 2010
      - 2: COSMIC forward operator by Shuttleworth et al. 2013
  routing:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [3]
    enum: [0, 1, 2, 3]
    title: Routing process case
    description: |-
      Process case for routing.
      - 0: deactivated
      - 1: Muskingum approach
      - 2: adaptive timestep, constant celerity
      - 3: adaptive timestep, spatially varying celerity
  temperature_routing:
    type: integer
    x-fortran-kind: i4
    default: 0
    examples: [0]
    enum: [0, 1]
    title: River temperature routing process case
    description: |-
      River temperature routing process case (needs routing).
      - 0: deactivated
      - 1: following: Beek et al., 2012
