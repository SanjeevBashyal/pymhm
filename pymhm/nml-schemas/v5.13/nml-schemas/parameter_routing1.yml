title: Routing - Case 1
description: Parameters for routing (case 1 - Muskingum).
x-fortran-namelist: routing1
type: object
properties:
  muskingumTravelTime_constant:
    title: Muskingum travel time constant
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.3100, 0.3500, 0.325, 1, 1]]
  muskingumTravelTime_riverLength:
    title: Muskingum travel time river length
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0700, 0.0800, 0.075, 1, 1]]
  muskingumTravelTime_riverSlope:
    title: Muskingum travel time river slope
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[1.9500, 2.1000, 2.0, 1, 1]]
  muskingumTravelTime_impervious:
    title: Muskingum travel time impervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0900, 0.1100, 0.1, 1, 1]]
  muskingumAttenuation_riverSlope:
    title: Muskingum attenuation river slope
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0100, 0.5000, 0.3, 1, 1]]
required:
  - muskingumTravelTime_constant
  - muskingumTravelTime_riverLength
  - muskingumTravelTime_riverSlope
  - muskingumTravelTime_impervious
  - muskingumAttenuation_riverSlope
