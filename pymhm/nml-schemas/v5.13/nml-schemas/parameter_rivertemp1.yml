title: River Temperature - Case 1
description: Parameters for River Temperature case 1.
x-fortran-namelist: rivertemp1
type: object
properties:
  albedo_water:
    title: Albedo of open water [-]
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.03, 0.2, 0.15, 0, 1]]
  pt_a_water:
    title: Priestley-Taylor coefficient for open water [-]
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[1.2, 2.0, 1.26, 0, 1]]
  emissivity_water:
    title: Emissivity of open water [-]
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.95, 0.99, 0.96, 0, 1]]
  turb_heat_ex_coeff:
    title: Turbulent heat exchange coefficient for open water [W m-2 K-1]
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[10.0, 50.0, 20.0, 0, 1]]
required:
  - albedo_water
  - pt_a_water
  - emissivity_water
  - turb_heat_ex_coeff
