title: Geological parameters
description: Parameters for geoparameter.
x-fortran-namelist: geoparameter
type: object
properties:
  GeoParam:
    title: Geological parameters
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: [max_geo_units, 5]
    x-nml-tools-ui:
      axes:
        "1":
          title: Geo unit
          label-template: "Geo unit {index}"
        "2":
          title: Parameter component
          labels: [Lower bound, Upper bound, Value, Flag, Scaling]
      table:
        row-axis: 1
        column-axis: 2
    description: |-
      Geological parameters (ordering according to class-definition file)
      These parameters are NOT REGIONALIZED yet, i.e. these are <beta> and not <gamma>
    examples: [[1.000, 1000.00, 100.0, 1, 1]]
required:
  - GeoParam
