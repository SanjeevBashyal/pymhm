title: Project configuration
description: Configuration for the overall project setup in mHM.
x-fortran-namelist: config_project
type: object
properties:
  project_details:
    type: string
    x-fortran-len: buf
    default: mHM project
    title: Project name
  setup_description:
    type: string
    x-fortran-len: buf
    default: Model run
    title: Description of the setup
  simulation_type:
    type: string
    x-fortran-len: buf
    default: Simulation
    title: Type of simulation
    description: |-
      e.g. hindcast simulation, seasonal forecast, climate projection
  Conventions:
    type: string
    x-fortran-len: buf
    default: None
    title: Convention used for dataset
  contact:
    type: string
    x-fortran-len: buf
    default: Developer
    title: Contact details, incl. PI name, modellers
  mHM_details:
    type: string
    x-fortran-len: buf
    default: Research unit
    title: Developing institution
  history:
    type: string
    x-fortran-len: buf
    default: Model run version 1
    title: Some details on data/model run version.
  nDomains:
    type: integer
    x-fortran-kind: i4
    default: 1
    title: Number of domains
    description: Number of domains to be simulated.
  iFlag_cordinate_sys:
    type: integer
    x-fortran-kind: i4
    default: 0
    title: Model run coordinate system
    description: |-
      Input data and model run coordinate system case.
      - 0: Regular X & Y coordinate system
      - 1: Regular Lat & Lon coordinate system

