title: mHM forcing directories
x-fortran-namelist: directories_mHM
type: object
properties:
  inputFormat_meteo_forcings:
    type: string
    x-fortran-len: buf
    enum: [nc]
    default: nc
  dir_Precipitation: &domain_directory
    type: array
    items:
      type: string
      x-fortran-len: buf
      format: directory-path
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    examples: [[data/meteo/pre/]]
  dir_Temperature:
    <<: *domain_directory
    examples: [[data/meteo/tavg/]]
  dir_ReferenceET:
    <<: *domain_directory
    examples: [[data/meteo/pet/]]
  dir_MinTemperature:
    <<: *domain_directory
    examples: [[data/meteo/tmin/]]
  dir_MaxTemperature:
    <<: *domain_directory
    examples: [[data/meteo/tmax/]]
  dir_NetRadiation:
    <<: *domain_directory
    examples: [[data/meteo/netrad/]]
  dir_absVapPressure:
    <<: *domain_directory
    examples: [[data/meteo/eabs/]]
  dir_windspeed:
    <<: *domain_directory
    examples: [[data/meteo/windspeed/]]
  dir_Radiation:
    <<: *domain_directory
    examples: [[data/meteo/ssrd/]]
  time_step_model_inputs:
    type: array
    items:
      type: integer
      minimum: -3
    x-fortran-shape: max_domains
    x-fortran-flex-tail-dims: 1
    examples: [[0]]
