title: mRM output configuration
description: Output configuration for mRM.
x-fortran-namelist: output_mrm
type: object
properties:
  output_deflate_level:
    title: Output deflate level
    type: integer
    x-fortran-kind: i4
    default: 6
    minimum: 0
    maximum: 9
    description: |-
      Compression level for netCDF4 outputs (0: no compression, 9: maximum compression).
  output_double_precision:
    title: Output double precision
    type: boolean
    default: false
  output_time_reference:
    title: Output time reference
    type: integer
    x-fortran-kind: i4
    enum: [0, 1, 2]
    default: 2
    description: |-
      Location of reference time point in outputs:
      - if 0 : start of the time interval (i.e. 1990-01-01 00:00 for daily output on 1990-01-01)
      - if 1 : center of the time interval (i.e. 1990-01-01 12:00 for daily output on 1990-01-01)
      - if 2 : end of the time interval (i.e. 1990-01-02 00:00 for daily output on 1990-01-01)
  output_frequency:
    title: Output time step
    type: integer
    x-fortran-kind: i4
    minimum: -3
    default: -1
    description: |-
      switch to control write out frequency of the gridded model outputs below
      - if >0 : after every 'n' time steps
      - if 0 : only at end of run
      - if -1 : daily
      - if -2 : monthly
      - if -3 : yearly
  out_Qrouted:
    title: Routed Streamflow
    type: boolean
    default: false
    description: Routed streamflow (Qrouted in output flux) (L11_qMod) [m3 s-1]
    examples: [true]
  out_RivTemp:
    title: Routed Temperature
    type: boolean
    default: false
    description: Routed temperature (only if River Temperature is enabled) [K]
    examples: [true]
