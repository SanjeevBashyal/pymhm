title: PET - Case -2
description: Parameters for PET (case -2 - aspect correction).
x-fortran-namelist: petm2
type: object
properties:
  minCorrectionFactorPET:
    title: minimum factor for PET correction with aspect
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.7000, 1.3000, 0.9, 1, 1]]
  maxCorrectionFactorPET:
    title: maximum factor for PET correction with aspect
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 0.2000, 0.1, 1, 1]]
  aspectTresholdPET:
    title: aspect threshold
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[160.00, 200.00, 180.0, 1, 1]]
required:
  - minCorrectionFactorPET
  - maxCorrectionFactorPET
  - aspectTresholdPET
