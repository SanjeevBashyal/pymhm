title: PET - Case 1
description: Parameters for PET (case 1 - Hargreaves-Samani).
x-fortran-namelist: pet1
type: object
properties:
  minCorrectionFactorPET:
    title: minimum correction factor for PET
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.7000, 1.3000, 0.9300, 1, 1]]
  maxCorrectionFactorPET:
    title: maximum correction factor for PET
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 0.2000, 0.1900, 1, 1]]
  aspectTresholdPET:
    title: aspect threshold for PET
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[160.00, 200.00, 171.00, 1, 1]]
  HargreavesSamaniCoeff:
    title: Hargreaves-Samani coefficient
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0016, 0.0030, 0.0023, 1, 1]]
required:
  - minCorrectionFactorPET
  - maxCorrectionFactorPET
  - aspectTresholdPET
  - HargreavesSamaniCoeff
