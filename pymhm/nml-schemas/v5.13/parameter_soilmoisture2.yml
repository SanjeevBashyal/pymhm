title: Soil moisture - Case 2
description: |-
  Jarvis equation for ET reduction, multi-layer infiltration capacity approach, Brooks-Corey like
x-fortran-namelist: soilmoisture2
type: object
properties:
  orgMatterContent_forest:
    title: Organic matter content for forest
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 20.000, 3.4, 1, 1]]
  orgMatterContent_impervious:
    title: Organic matter content for impervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 1.0000, 0.1, 1, 1]]
  orgMatterContent_pervious:
    title: Organic matter content for pervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 4.0000, 0.6, 1, 1]]
  PTF_lower66_5_constant:
    title: Zacharias PTF parameters below 66.5 % sand content
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.6462, 0.9506, 0.76, 1, 1]]
  PTF_lower66_5_clay:
    title: Multiplier for clay constant below 66.5 % sand content
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0001, 0.0029, 0.0009, 1, 1]]
  PTF_lower66_5_Db:
    title: Multiplier for mineral bulk density below 66.5 % sand content
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[-0.3727, -0.1871, -0.264, 1, 1]]
  PTF_higher66_5_constant:
    title: Zacharias PTF parameters above 66.5 % sand content
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.5358, 1.1232, 0.89, 1, 1]]
  PTF_higher66_5_clay:
    title: Multiplier for clay constant above 66.5 % sand content
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[-0.0055, 0.0049, -0.001, 1, 1]]
  PTF_higher66_5_Db:
    title: Multiplier for mineral bulk density above 66.5 % sand content
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[-0.5513, -0.0913, -0.324, 1, 1]]
  PTF_Ks_constant:
    title: PTF constant for saturated hydraulic conductivity
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[-1.2000, -0.2850, -0.585, 1, 1]]
  PTF_Ks_sand:
    title: Multiplier for sand for saturated hydraulic conductivity
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0060, 0.0260, 0.0125, 1, 1]]
  PTF_Ks_clay:
    title: Multiplier for clay for saturated hydraulic conductivity
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0030, 0.0130, 0.0063, 1, 1]]
  PTF_Ks_curveSlope:
    title: Unit conversion factor
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    description: Unit conversion factor from inch/h to cm/d -> should not be here
    default: [60.960, 60.960, 60.960, 0, 1]
  rootFractionCoefficient_forest:
    title: Root fraction coefficient for forest
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.9000, 0.9990, 0.97, 1, 1]]
  rootFractionCoefficient_impervious:
    title: Root fraction coefficient for impervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.9000, 0.9500, 0.93, 1, 1]]
  rootFractionCoefficient_pervious:
    title: Root fraction coefficient for pervious
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0010, 0.0900, 0.02, 1, 1]]
  infiltrationShapeFactor:
    title: Infiltration shape factor
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    description: |-
      Shape factor for partitioning effective precipitation into
      runoff and infiltration based on soil wetness [-]
    examples: [[1.0000, 4.0000, 1.75, 1, 1]]
  jarvis_sm_threshold_c1:
    title: Jarvis soil moisture threshold c1
    type: array
    items:
      type: number
      x-fortran-kind: dp
    x-fortran-shape: 5
    examples: [[0.0000, 1.0000, 0.50, 1, 1]]
required:
  - orgMatterContent_forest
  - orgMatterContent_impervious
  - orgMatterContent_pervious
  - PTF_lower66_5_constant
  - PTF_lower66_5_clay
  - PTF_lower66_5_Db
  - PTF_higher66_5_constant
  - PTF_higher66_5_clay
  - PTF_higher66_5_Db
  - PTF_Ks_constant
  - PTF_Ks_sand
  - PTF_Ks_clay
  - rootFractionCoefficient_forest
  - rootFractionCoefficient_impervious
  - rootFractionCoefficient_pervious
  - infiltrationShapeFactor
  - jarvis_sm_threshold_c1
